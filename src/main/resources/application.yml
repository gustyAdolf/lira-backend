server:
  port: 8081
  error:
    include-message: always
  servlet:
    context-path: /lira-api

jwt:
  secret: ${JWT_SECRET:ph0bo$_dev_only}
  expirationMs: 604800000 # 7 days in milliseconds

spring:
  application:
    name: lira

  jpa:
    show-sql: false
    open-in-view: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/liradb}
    username: ${DB_USERNAME:lira}
    password: ${DB_PASSWORD:L1ra}
    hikari:
      connection-timeout: 30000
      max-lifetime: 18000000

  flyway:
    baseline-on-migrate: true
    baseline-version: 3
    locations: classpath:db/migration

user:
  image:
    path: /Users/gusty/Documents/lira/images/users/
    preffix: /images/users/

company:
  image:
    path: /Users/gusty/Documents/lira/images/companies/
    preffix: /images/companies/

groq:
  api-key: ${GROQ_API_KEY:}
  whisper-model: whisper-large-v3
  llm-model: llama-3.3-70b-versatile

logging:
  level:
    com.lira: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN